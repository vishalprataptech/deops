
services:
    nodejs-server:
      image: vishalpratapsingh/chaicode:demo
      deploy:
        replicas: 5
      networks: 
          - chaicode-internal
    
    
    
    caddy:
        image: caddy:latest
        ports:
          - "80:80"
          - "443:443"
        volumes:
          - ./Caddyfile:/etc/caddy/Caddyfile:ro
        networks:
         - chaicode-internal
          
    
    
    
networks:
        chaicode-internal:
          driver: bridge