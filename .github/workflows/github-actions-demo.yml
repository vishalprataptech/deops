name: Deops GitHub Actions

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker Image
        run: |
          docker build -t vishalpratapsingh/chaicode:demo .

      - name: Push Docker Image
        run: |
          docker push vishalpratapsingh/chaicode:demo

      - name: Deploy on Excloud
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 210.79.129.187
          username: ubuntu
          key: ${{ secrets.PRIVATE_KEY }}
          script: |
            sudo docker rm -f chaicode-app || true
            sudo docker pull vishalpratapsingh/chaicode:demo
            sudo docker run -d \
              --name chaicode-app \
              -p 3000:3000 \
              vishalpratapsingh/chaicode:demo
            sudo docker image prune -f
