
name:  Deops GitHub Actions
on:
  push:
    branches:
      - main
jobs:
  Explore-GitHub-Actions:
    runs-on: ubuntu-latest
    steps:
          -
           name: Login to Docker Hub
           uses: docker/login-action@v4
           with:
           username: ${{ vars.DOCKERHUB_USERNAME }}
           password: ${{ secrets.DOCKERHUB_TOKEN }}
          -
           name: Set up QEMU
           uses: docker/setup-qemu-action@v4
          -
           name: Set up Docker Buildx
           uses: docker/setup-buildx-action@v4

          - name: Check out repository code
            uses: actions/checkout@v5

          -
            name: Build and push
            run: |
             docker build -t vishalpratapsingh/chaicode:demo .
             docker push vishalpratapsingh/chaicode:demo


          - name: Deploy on Excloud
            uses: appleboy/ssh-action@v1.0.3
            with:
              host: 210.79.129.187
              username: ubuntu
              key: ${{secrets.PRIVATE_KEY}}
              script: |
                sudo docker rm -f funny_engelbart
                sudo docker pull vishalpratapsingh/chaicode:demo
                sudo run -d --name chaicode-app -p 3000:3000  vishalpratapsingh/chaicode:demo
                sudo docker image prune -f
 
